# Dark Flow routine schedule — generated by install.sh. Safe to edit after installation.
# Run a routine manually:  bash .darkflow.d/darkflow-run.sh <name>
# List routines and status: bash .darkflow.d/darkflow-run.sh --list
# Cron times are in the machine's local timezone.
#
# permission_mode options:
#   bypassPermissions — act without asking (matches "Always allowed" in the Claude Code UI)
#   acceptEdits       — allow file edits but still prompt for shell commands
#
# engine options (per routine, default claude):
#   claude — run via Claude Code (claude -p "/darkflow:<name>")
#   codex  — run via OpenAI Codex CLI (codex exec); requires `codex` installed + authed
defaults:
  model: sonnet
  engine: claude
  permission_mode: bypassPermissions

routines:
  fix-issues:
    cron: "*/15 * * * *"
    model: sonnet
    engine: claude
    enabled: true

  security-audit:
    cron: "0 3 * * 0"
    model: opus
    engine: claude
    enabled: true

  vulnerability-check:
    cron: "0 6 * * *"
    model: sonnet
    engine: claude
    enabled: true
