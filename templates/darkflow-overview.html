<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Flow — Projects</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #6b6b6b;
    --green: #4ade80;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 28px 32px;
  }

  header { margin-bottom: 28px; }
  .title    { font-size: 20px; font-weight: 600; }
  .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; display: flex; align-items: center; gap: 8px; }

  .df-badge {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
    background: rgba(74,222,128,.1); color: var(--green); border-radius: 4px; padding: 2px 7px;
  }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .project-card:hover { border-color: #3a3a3a; background: #1c1c1c; }

  .project-name      { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .project-slug      { font-size: 11px; color: var(--muted); font-family: monospace; margin-bottom: 8px; }
  .project-installed { font-size: 11px; color: var(--muted); }
  .project-installed span { color: var(--green); }

  .empty {
    color: var(--muted); font-size: 13px;
    padding: 40px 0; text-align: center;
    grid-column: 1/-1;
  }

  a { color: inherit; text-decoration: none; }
</style>
</head>
<body>

<!-- ===== DATA BLOCK — updated automatically by darkflow install/update ===== -->
<script id="darkflow-overview-data" type="application/json">
{
  "projects": []
}
</script>
<!-- ===== END DATA BLOCK ===== -->

<div id="app"></div>

<script>
(function () {
  function esc(s) {
    return String(s || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  var d        = JSON.parse(document.getElementById('darkflow-overview-data').textContent);
  var projects = d.projects || [];

  var html = '<header>'
    + '<div class="title">Dark Flow</div>'
    + '<div class="subtitle">Projects&nbsp;<span class="df-badge">Dark Flow</span></div>'
    + '</header>'
    + '<div class="projects-grid">';

  if (projects.length === 0) {
    html += '<div class="empty">No projects yet.<br>Run <code>install.sh</code> inside any project directory.</div>';
  } else {
    html += projects.map(function (p) {
      return '<a class="project-card" href="' + esc(p.path) + '">'
        + '<div class="project-name">' + esc(p.name) + '</div>'
        + (p.slug ? '<div class="project-slug">' + esc(p.slug) + '</div>' : '')
        + (p.installed ? '<div class="project-installed">Installed <span>' + esc(p.installed) + '</span></div>' : '')
        + '</a>';
    }).join('');
  }

  html += '</div>';
  document.getElementById('app').innerHTML = html;
})();
</script>
</body>
</html>
