<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PROJECT_NAME}} — Overview</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #6b6b6b;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 28px 32px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
  }

  .project-name { font-size: 20px; font-weight: 600; }
  .subtitle     { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .updated      { font-size: 12px; color: var(--muted); text-align: right; margin-top: 4px; }

  /* ── Stats row ─────────────────────────────────────────────────── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    display: block;
  }

  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .stat-value { font-size: 26px; font-weight: 600; line-height: 1; }
  .stat-value.muted { color: var(--muted); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ── Status mini-cards ─────────────────────────────────────────── */
  .status-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .status-mini {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
  }

  .status-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .status-indicator { display: flex; align-items: center; gap: 8px; }

  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-green  { background: var(--green);  box-shadow: 0 0 6px var(--green); }
  .dot-yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
  .dot-red    { background: var(--red);    box-shadow: 0 0 6px var(--red); }
  .dot-gray   { background: var(--muted); }

  .status-text   { font-size: 13px; font-weight: 500; }
  .status-detail { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ── Main two-column layout ────────────────────────────────────── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  @media (max-width: 700px) { .main-grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }

  .card-approval   { border-color: rgba(251,191,36,.3); }
  .card-inprogress { border-color: rgba(96,165,250,.25); }

  .card-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .count-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    border-radius: 10px;
    padding: 1px 7px;
    line-height: 1.6;
  }

  .count-badge-yellow { background: rgba(251,191,36,.15); color: var(--yellow); }
  .count-badge-blue   { background: rgba(96,165,250,.12);  color: var(--blue); }
  .count-badge-muted  { background: rgba(107,107,107,.15); color: var(--muted); }

  /* ── Issue rows ────────────────────────────────────────────────── */
  .issue-list { display: flex; flex-direction: column; gap: 6px; }

  .issue-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    background: var(--surface2);
    border-radius: 6px;
    border: 1px solid transparent;
  }

  .issue-num   { font-size: 11px; color: var(--muted); min-width: 32px; flex-shrink: 0; }

  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    min-width: 28px;
    text-align: center;
    flex-shrink: 0;
  }
  .badge-p0 { background: rgba(248,113,113,.15); color: var(--red); }
  .badge-p1 { background: rgba(251,191,36,.15);  color: var(--yellow); }
  .badge-p2 { background: rgba(96,165,250,.12);  color: var(--blue); }
  .badge-p3 { background: rgba(107,107,107,.15); color: var(--muted); }

  .issue-title {
    flex: 1; font-size: 13px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .issue-area {
    font-size: 10px; color: var(--muted);
    background: var(--surface); padding: 2px 6px; border-radius: 4px;
    white-space: nowrap; flex-shrink: 0;
  }

  .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 24px 0; }

  /* ── Links ─────────────────────────────────────────────────────── */
  a { color: inherit; text-decoration: none; }
  a.issue-row:hover  { border-color: var(--border); background: #252525; }
  a.stat-card:hover  { background: #1c1c1c; }
  .card-title a { color: var(--muted); border-bottom: 1px solid transparent; }
  .card-title a:hover { border-bottom-color: var(--muted); }
</style>
</head>
<body>

<!-- ===== DATA BLOCK — updated automatically by the overview-update routine ===== -->
<script id="overview-data" type="application/json">
{
  "project": "{{PROJECT_NAME}}",
  "last_updated": null,
  "analytics": {
    "users_total": null,
    "visitors_7d": null,
    "revenue_7d": null,
    "currency": "USD"
  },
  "github": {
    "repo_url": null,
    "open_total": null,
    "awaiting_approval": [],
    "in_progress": []
  },
  "security": {
    "open_issues": null,
    "critical_open": 0,
    "last_audit": null,
    "status": "unknown"
  },
  "architecture": {
    "open_issues": null,
    "last_review": null,
    "status": "unknown"
  }
}
</script>
<!-- ===== END DATA BLOCK ===== -->

<div id="app"></div>

<script>
(function () {
  function esc(s) {
    return String(s || '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function fmt(n, prefix) {
    if (n === null || n === undefined) return '—';
    prefix = prefix || '';
    if (n >= 1e6) return prefix + (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return prefix + (n / 1e3).toFixed(1) + 'K';
    return prefix + Number(n).toLocaleString();
  }

  function dotClass(status) {
    if (status === 'ok' || status === 'healthy') return 'dot-green';
    if (status === 'warning')                   return 'dot-yellow';
    if (status === 'critical' || status === 'danger') return 'dot-red';
    return 'dot-gray';
  }

  function deriveSecStatus(sec) {
    if (sec.open_issues === null) return 'unknown';
    if ((sec.critical_open || 0) > 0) return 'critical';
    if (sec.open_issues > 5)          return 'warning';
    return 'ok';
  }

  function deriveArchStatus(arch) {
    if (arch.open_issues === null) return 'unknown';
    if (arch.open_issues > 10) return 'warning';
    return 'ok';
  }

  function statusSummary(obj) {
    const n = obj.open_issues;
    const c = obj.critical_open || 0;
    if (n === null) return 'Not yet audited';
    if (c > 0)     return c + ' critical open';
    if (n === 0)   return 'No open issues';
    return n + ' open issue' + (n !== 1 ? 's' : '');
  }

  var raw  = document.getElementById('overview-data').textContent;
  var d    = JSON.parse(raw);
  var gh   = d.github       || {};
  var an   = d.analytics    || {};
  var sec  = d.security     || {};
  var arch = d.architecture || {};
  var repo = gh.repo_url    || null;

  function issueHref(n)    { return repo ? repo + '/issues/' + n : null; }
  function filterHref(lbl) { return repo ? repo + '/issues?q=' + encodeURIComponent('is:open label:' + lbl) : null; }
  function allHref()       { return repo ? repo + '/issues' : null; }

  function row(cls, href, inner) {
    if (href) return '<a class="' + cls + '" href="' + href + '" target="_blank" rel="noopener">' + inner + '</a>';
    return '<div class="' + cls + '">' + inner + '</div>';
  }

  var secStatus  = sec.status  !== 'unknown' ? sec.status  : deriveSecStatus(sec);
  var archStatus = arch.status !== 'unknown' ? arch.status : deriveArchStatus(arch);

  var pending    = (gh.awaiting_approval || []).slice(0, 20);
  var inprogress = (gh.in_progress       || []).slice(0, 20);

  var updatedStr = d.last_updated
    ? 'Updated ' + new Date(d.last_updated).toLocaleString('en-US',
        { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })
    : 'Not yet updated';

  var moneyPrefix = an.currency === 'EUR' ? '€' : '$';

  function issueRowInner(i) {
    return '<span class="issue-num">#' + esc(i.number) + '</span>'
      + (i.priority ? '<span class="badge badge-' + esc(i.priority) + '">' + esc(i.priority.toUpperCase()) + '</span>' : '')
      + '<span class="issue-title">' + esc(i.title) + '</span>'
      + (i.area ? '<span class="issue-area">' + esc(i.area) + '</span>' : '');
  }

  function issueCard(title, filterLabel, issues, badgeCls, cardCls, emptyMsg) {
    var titleHtml = filterHref(filterLabel)
      ? '<a href="' + filterHref(filterLabel) + '" target="_blank" rel="noopener">' + title + '</a>'
      : title;
    return '<div class="card ' + cardCls + '">'
      + '<div class="card-title">' + titleHtml
      + '<span class="count-badge ' + badgeCls + '">' + issues.length + '</span></div>'
      + (issues.length
          ? '<div class="issue-list">' + issues.map(function(i) {
              return row('issue-row', issueHref(i.number), issueRowInner(i));
            }).join('') + '</div>'
          : '<div class="empty">' + emptyMsg + '</div>')
      + '</div>';
  }

  var html = '<header>'
    + '<div><div class="project-name">' + esc(d.project || 'Project') + '</div>'
    + '<div class="subtitle">Project Overview</div></div>'
    + '<div class="updated">' + esc(updatedStr) + '</div>'
    + '</header>'

    + '<div class="stats-grid">'
    + '<div class="stat-card"><div class="stat-label">Total Users</div>'
    + '<div class="stat-value">' + fmt(an.users_total) + '</div>'
    + '<div class="stat-sub">registered</div></div>'

    + '<div class="stat-card"><div class="stat-label">Visitors (7d)</div>'
    + '<div class="stat-value">' + fmt(an.visitors_7d) + '</div>'
    + '<div class="stat-sub">unique</div></div>'

    + '<div class="stat-card"><div class="stat-label">Revenue (7d)</div>'
    + '<div class="stat-value' + (an.revenue_7d === null ? ' muted' : '') + '">'
    + fmt(an.revenue_7d, an.revenue_7d !== null ? moneyPrefix : '') + '</div>'
    + '<div class="stat-sub">last 7 days</div></div>'

    + row('stat-card', allHref(), '<div class="stat-label">Open Issues</div>'
        + '<div class="stat-value">' + fmt(gh.open_total) + '</div>'
        + '<div class="stat-sub">github</div>')
    + '</div>'

    + '<div class="main-grid">'
    + issueCard('Awaiting Approval', 'status:proposed',    pending,    'count-badge-yellow', 'card-approval',   'Nothing to approve')
    + issueCard('In Progress',       'status:in-progress', inprogress, 'count-badge-blue',   'card-inprogress', 'No work in progress')
    + '</div>'

    + '<div class="status-row">'
    + '<div class="status-mini"><div class="status-label">Security</div>'
    + '<div class="status-indicator"><div class="dot ' + dotClass(secStatus) + '"></div>'
    + '<div class="status-text">' + esc(statusSummary(sec)) + '</div></div>'
    + '<div class="status-detail">' + (sec.last_audit ? 'Last audit: ' + esc(sec.last_audit) : 'No audit recorded') + '</div>'
    + '</div>'

    + '<div class="status-mini"><div class="status-label">Architecture</div>'
    + '<div class="status-indicator"><div class="dot ' + dotClass(archStatus) + '"></div>'
    + '<div class="status-text">' + esc(statusSummary(arch)) + '</div></div>'
    + '<div class="status-detail">' + (arch.last_review ? 'Last review: ' + esc(arch.last_review) : 'No review recorded') + '</div>'
    + '</div>'
    + '</div>';

  document.getElementById('app').innerHTML = html;
})();
</script>
</body>
</html>
