# Dark Flow installation checklist — source of truth for what must exist in a project.
#
# Consumed by check.sh (run automatically at the end of install.sh / update.sh,
# or manually: bash check.sh [--fix] [--quiet]).
#
# Add items here as the installer grows. Old projects will pick up the new
# items on next `darkflow:update` and check.sh --fix will install the missing ones.

schema: 1

# Item fields:
#   id           unique slug (for logs)
#   group        nice grouping in output (core | docs | commands | dispatcher | config | module-X)
#   type         file | dir | marker | config-key | command
#   path         where to check
#   template     (file) source under templates/ (defaults to mirror of `path` if omitted)
#   executable   (file) chmod +x after fetch
#   marker_start (marker) string that must exist in file
#   key          (config-key) key=… that must exist in `path`
#   default      (config-key) value to append if missing
#   check        (command) shell expression — exit 0 = present
#   fix          named handler in check.sh (copy-template | mkdir | append-config | install-arch-skill | add-routine | update-force)
#                Marker types use `update-force` to re-run update.sh --force (executes at most once per check.sh run).
#   when         module.<name> | platform.macos | platform.linux
#   desc         one-line description

items:
  # ── Core directories ──────────────────────────────────────────────────────────
  - { id: dir-docs-product,        group: docs,       type: dir, path: docs/product,             fix: mkdir, desc: "Product docs (positioning, audience, pricing)" }
  - { id: dir-docs-spec-flows,     group: docs,       type: dir, path: docs/spec/flows,          fix: mkdir, desc: "User flow specs" }
  - { id: dir-docs-spec-screens,   group: docs,       type: dir, path: docs/spec/screens,        fix: mkdir, desc: "Screen inventory specs" }
  - { id: dir-docs-design-assets,  group: docs,       type: dir, path: docs/design/assets,       fix: mkdir, desc: "Design assets" }
  - { id: dir-docs-insights-qual,  group: docs,       type: dir, path: docs/insights/qualitative, fix: mkdir, desc: "Qualitative insights" }
  - { id: dir-docs-decisions,      group: docs,       type: dir, path: docs/decisions,           fix: mkdir, desc: "Architecture decision records" }
  - { id: dir-issue-template,      group: docs,       type: dir, path: .github/ISSUE_TEMPLATE,   fix: mkdir, desc: "GitHub issue template dir" }
  - { id: dir-darkflow-d,          group: dispatcher, type: dir, path: .darkflow.d,              fix: mkdir, desc: "Dispatcher dir" }
  - { id: dir-darkflow-state,      group: dispatcher, type: dir, path: .darkflow.d/state,        fix: mkdir, desc: "Dispatcher state dir" }

  # ── Core files (docs) ────────────────────────────────────────────────────────
  - { id: file-docs-readme,        group: docs,       type: file, path: docs/README.md,                                template: docs/README.md,                                fix: copy-template, desc: "Docs index" }
  - { id: file-agent-workflow,     group: docs,       type: file, path: docs/agent-workflow.md,                        template: docs/agent-workflow.md,                        fix: copy-template, desc: "Agent workflow doc" }
  - { id: file-github-issues,      group: docs,       type: file, path: docs/github-issues.md,                         template: docs/github-issues.md,                         fix: copy-template, desc: "GitHub issues guide" }
  - { id: file-auto-approve,       group: docs,       type: file, path: docs/auto-approve.md,                          template: docs/auto-approve.md,                          fix: copy-template, desc: "Auto-approve allowlist" }
  - { id: file-adr-template,       group: docs,       type: file, path: docs/decisions/TEMPLATE.md,                    template: docs/decisions/TEMPLATE.md,                    fix: copy-template, desc: "ADR template" }
  - { id: file-issue-template,     group: docs,       type: file, path: .github/ISSUE_TEMPLATE/recommendation.yml,     template: .github/ISSUE_TEMPLATE/recommendation.yml,     fix: copy-template, desc: "Recommendation issue template" }

  # ── Project operational files ────────────────────────────────────────────────
  # Slash commands and the worker itself are no longer per-project — they live in
  # user/home scope (~/.claude/commands/darkflow/ and ~/.darkflow/darkflow-run.sh)
  # and are (re)installed by install.sh's global_bootstrap on every run, so they
  # are intentionally NOT verified per project here. Only files a project genuinely
  # owns remain below.
  - { id: mailbox-fetch-py,        group: dispatcher, type: file, path: .darkflow.d/mailbox/fetch.py,                        template: darkflow/mailbox/fetch.py,                           fix: copy-template, when: module.mailbox, desc: "Mailbox IMAP fetch script" }
  - { id: mailbox-send-py,         group: dispatcher, type: file, path: .darkflow.d/mailbox/send.py,                         template: darkflow/mailbox/send.py,                            fix: copy-template, when: module.mailbox, desc: "Mailbox SMTP send script" }
  - { id: wf-ci-gate,              group: dispatcher, type: file, path: .github/workflows/darkflow-ci-gate.yml,               template: .github/workflows/darkflow-ci-gate.yml,              fix: copy-template, when: module.ci-gate, desc: "CI gate GitHub Actions workflow" }

  # ── Dispatcher ───────────────────────────────────────────────────────────────
  - { id: dispatcher-get-config,   group: dispatcher, type: file, path: .darkflow.d/get-config.sh,          template: darkflow/get-config.sh,          executable: true, fix: copy-template, desc: "Fetch project settings from Web UI" }
  - { id: dispatcher-routines,     group: dispatcher, type: file, path: .darkflow.d/routines.yml,           template: darkflow/routines.yml,                              fix: copy-template, desc: "Routine schedule (project-specific — copy of generic template if missing)" }

  # ── Dark Flow instruction file + CLAUDE.md reference ────────────────────────
  - { id: file-darkflow-claude,    group: docs,       type: file,   path: .darkflow.d/claude.md,  fix: copy-template, template: darkflow/claude.md, desc: "Dark Flow instructions for Claude" }
  - { id: ref-claude-md,           group: docs,       type: marker, path: CLAUDE.md, marker_start: "@.darkflow.d/claude.md", fix: add-darkflow-ref, desc: "@-include reference in CLAUDE.md" }
  - { id: marker-makefile,         group: dispatcher, type: marker, path: Makefile,  marker_start: "# darkflow:start", fix: regenerate-marker, desc: "Dark Flow block in Makefile" }

  # ── .darkflow config keys ────────────────────────────────────────────────────
  - { id: cfg-webapp-url,          group: config,     type: config-key, path: .darkflow, key: webapp_url,      default: "http://localhost:5555", fix: append-config, desc: "webapp_url" }
  - { id: cfg-slug,                group: config,     type: config-key, path: .darkflow, key: slug,                                             fix: append-config, desc: "project slug (re-run update.sh if missing)" }
  - { id: cfg-name,                group: config,     type: config-key, path: .darkflow, key: name,                                             fix: append-config, desc: "project name (re-run update.sh if missing)" }
  - { id: cfg-max-concurrent,      group: config,     type: config-key, path: .darkflow, key: max_concurrent,  default: "3",                    fix: append-config, desc: "max concurrent routines (default: 3)" }

  # ── Per-module dirs ──────────────────────────────────────────────────────────
  - { id: mod-analytics-dir, group: module-analytics, type: dir, path: docs/insights/analytics,      when: module.analytics, fix: mkdir, desc: "Analytics snapshots dir" }
  - { id: mod-gsc-dir,       group: module-gsc,       type: dir, path: docs/insights/search-console, when: module.gsc,       fix: mkdir, desc: "Search Console snapshots dir" }
  - { id: mod-ads-dir,       group: module-ads,       type: dir, path: docs/insights/ads,            when: module.ads,       fix: mkdir, desc: "Ads snapshots dir" }

  # ── Routines (entries inside .darkflow.d/routines.yml) ──────────────────────
  # If a new routine is added in a later Dark Flow version, old installs catch
  # it here via update.sh -> check.sh --fix. Cron/model values mirror install.sh.
  - { id: routine-fix-issues,          group: routines, type: routine, path: .darkflow.d/routines.yml, routine_key: fix-issues,          cron: "0 * * * *",   model: sonnet, engine: claude, enabled: true,  fix: add-routine, desc: "fix-issues (hourly)" }
  - { id: routine-fix-ci-issue,        group: routines, type: routine, when: module.ci-gate,         path: .darkflow.d/routines.yml, routine_key: fix-ci-issue,        cron: "*/15 * * * *", model: sonnet, engine: claude, enabled: true,  fix: add-routine, desc: "fix-ci-issue (every 15 min)" }
  - { id: routine-security-audit,       group: routines, type: routine, path: .darkflow.d/routines.yml, routine_key: security-audit,       cron: "0 3 * * 0",   model: opus,   engine: claude, enabled: true,  fix: add-routine, desc: "security-audit (weekly Sun 3:00)" }
  - { id: routine-vulnerability-check, group: routines, type: routine, path: .darkflow.d/routines.yml, routine_key: vulnerability-check, cron: "0 6 * * *",   model: sonnet, engine: claude, enabled: true,  fix: add-routine, desc: "vulnerability-check (daily 6:00)" }
  - { id: routine-build-optimization,  group: routines, type: routine, path: .darkflow.d/routines.yml, routine_key: build-optimization,  cron: "0 4 * * 0",   model: opus,   engine: claude, enabled: true,  fix: add-routine, desc: "build-optimization (weekly Sun 4:00)" }
  - { id: routine-uptime-check,        group: routines, type: routine, path: .darkflow.d/routines.yml, routine_key: uptime-check,        cron: "0 */4 * * *", model: sonnet, engine: claude, enabled: true,  fix: add-routine, desc: "uptime-check (every 4h)" }
  - { id: routine-docs-audit,          group: routines, type: routine, when: module.docs-audit,       path: .darkflow.d/routines.yml, routine_key: docs-audit,          cron: "0 5 * * 0",   model: opus,   engine: claude, enabled: true,  fix: add-routine, desc: "docs-audit (weekly Sun 5:00)" }
  - { id: routine-product-overview,    group: routines, type: routine, when: module.product-overview, path: .darkflow.d/routines.yml, routine_key: product-overview,    cron: "0 7 * * 1",   model: opus,   engine: claude, enabled: true,  fix: add-routine, desc: "product-overview (weekly Mon 7:00)" }
  - { id: routine-analytics-review,    group: routines, type: routine, when: module.analytics,     path: .darkflow.d/routines.yml, routine_key: analytics-review,    cron: "0 8 * * *",   model: sonnet, engine: claude, enabled: true,  fix: add-routine, desc: "analytics-review (daily 8:00)" }
  - { id: routine-observability-check, group: routines, type: routine, when: module.observability, path: .darkflow.d/routines.yml, routine_key: observability-check, cron: "30 8 * * *",  model: sonnet, engine: claude, enabled: true,  fix: add-routine, desc: "observability-check (daily 8:30)" }
  - { id: routine-gsc-check,           group: routines, type: routine, when: module.gsc,           path: .darkflow.d/routines.yml, routine_key: gsc-check,           cron: "0 8 * * 1",   model: sonnet, engine: claude, enabled: true,  fix: add-routine, desc: "gsc-check (weekly Mon 8:00)" }
  - { id: routine-ads-review,          group: routines, type: routine, when: module.ads,           path: .darkflow.d/routines.yml, routine_key: ads-review,          cron: "0 8 * * 1",   model: sonnet, engine: claude, enabled: true,  fix: add-routine, desc: "ads-review (weekly Mon 8:00)" }
  - { id: routine-coolify-check-deployment, group: routines, type: routine, when: module.coolify,  path: .darkflow.d/routines.yml, routine_key: coolify-check-deployment, cron: "0 9 * * *",   model: sonnet, engine: claude, enabled: true,  fix: add-routine, desc: "coolify-check-deployment (daily 9:00)" }
  - { id: routine-claude-md-update,    group: routines, type: routine, when: module.claude-update, path: .darkflow.d/routines.yml, routine_key: claude-md-update,    cron: "0 9 * * 1-5", model: sonnet, engine: claude, enabled: true,  fix: add-routine, desc: "claude-md-update (weekdays 9:00)" }
  - { id: routine-architecture-review, group: routines, type: routine, when: module.arch-review,   path: .darkflow.d/routines.yml, routine_key: architecture-review, cron: "0 2 * * 0",   model: opus,   engine: claude, enabled: true,  fix: add-routine, desc: "architecture-review (weekly Sun 2:00)" }
  - { id: routine-code-health,         group: routines, type: routine, when: module.fallow,        path: .darkflow.d/routines.yml, routine_key: code-health,         cron: "0 7 * * 0",   model: sonnet, engine: claude, enabled: true,  fix: add-routine, desc: "code-health (weekly Sun 7:00)" }
  - { id: routine-design-audit,        group: routines, type: routine, when: module.impeccable,     path: .darkflow.d/routines.yml, routine_key: design-audit,        cron: "0 10 * * 6",  model: opus,   engine: claude, enabled: true,  fix: add-routine, desc: "design-audit (weekly Sat 10:00)" }
  - { id: routine-design-critique,     group: routines, type: routine, when: module.impeccable,     path: .darkflow.d/routines.yml, routine_key: design-critique,     cron: "0 11 * * 6",  model: opus,   engine: claude, enabled: true,  fix: add-routine, desc: "design-critique (weekly Sat 11:00)" }
  - { id: routine-design-harden,       group: routines, type: routine, when: module.impeccable,     path: .darkflow.d/routines.yml, routine_key: design-harden,       cron: "0 10 1 * *",  model: opus,   engine: claude, enabled: true,  fix: add-routine, desc: "design-harden (monthly 1st 10:00)" }

  # Note: the improve-codebase-architecture skill is installed once via install.sh
  # (`npx skills add ...`) and we do NOT verify it here — `npx skills list` does
  # network calls and can hang. Re-run install.sh if the skill goes missing.
